name: argo-global
title: Argo's North Atlantic
description: >
  Three thousand five hundred robotic floats sounding the upper 2000 metres
  of the North Atlantic every ten days. This recipe shows where they are now —
  a quarter-century cloud of surfacings sketching the basin's shape in the
  data scientists collected from it.
created: 2026-04-29
author: chipi
region:
  lat: [20, 75]
  lon: [-90, 10]
  name: North Atlantic (full)
sources:
  primary: argo
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: scatter
  colormap: argo
  marker_size: 10
  marker_opacity: 0.8
  seed: 505
audio:
  drone_waveform: triangle
  drone_glide: 0.43
  pulse_sensitivity: 0.44
  presence: 0.62
  accent_style: chime
  texture_density: 0.35
tension_arc:
  preset: classic
  peak_position: 0.65
  peak_height: 1.0
  release_steepness: 0.7
  pin_key_moment: true
