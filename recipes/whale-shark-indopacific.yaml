name: whale-shark-indopacific
title: Whale shark — the Indo-Pacific year
description: >
  Two thirds of all whale-shark sightings on Earth happen in this belt —
  from Mozambique through the Maldives, Indonesia, Australia, the
  Philippines. Each aggregation site has its own season; rendered together,
  the colour wheel turns west to east. Mafia greens in austral spring,
  Ningaloo blues into autumn, Donsol reds by November. One ocean, twelve
  rhythms.
created: 2026-05-05
author: chipi
region:
  lat: [-30, 30]
  lon: [30, 150]
  name: Indo-Pacific belt
sources:
  primary: obis-whale-shark
  context: gebco
schedule: daily

