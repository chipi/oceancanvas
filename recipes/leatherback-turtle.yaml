name: leatherback-turtle
title: Leatherback turtle
description: >
  Sixty-six years of leatherback observations spanning Atlantic, Pacific,
  and Indian basins. The species hunts jellyfish from the equator to
  subarctic feeding grounds; the trace is hemispheric — one of the only
  reptiles that ranges this far into cold water.
