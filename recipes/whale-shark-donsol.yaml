name: whale-shark-donsol
title: Whale shark — Donsol, the season
description: >
  Donsol Bay in the Philippines is the second great whale-shark
  aggregation site after Ningaloo — sharks arrive each November and stay
  through May, feeding on the plankton blooms in the Sibuyan Sea. The
  dots cluster tight against the coastline; the seasonal colours arc from
  late autumn into early summer.
