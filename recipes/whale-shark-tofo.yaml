name: whale-shark-tofo
title: Whale shark — Tofo, the warm corner
description: >
  Off Tofo Beach in southern Mozambique, the Agulhas Current sweeps warm
  Indian Ocean water past the continental shelf and concentrates plankton
  in the upwelling zones — and the whale sharks come. Smaller cluster than
  Ningaloo but the seasonality is pronounced: October-March is the season,
  and the dots in cold months are nearly absent.
created: 2026-05-05
author: chipi
