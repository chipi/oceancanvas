name: whale-shark-ningaloo
title: Whale shark — Ningaloo, April
description: >
  Each year between March and July, hundreds of whale sharks gather along
  the Ningaloo Reef on Western Australia's coast — drawn by the coral spawn
  and the bloom that follows. Forty years of sightings packed into a
  five-degree box. Eighty per cent of them happen in three months: the dots
  burn bright in May and fade to almost nothing by August.
created: 2026-05-05
author: chipi
