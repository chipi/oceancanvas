# Status: NEEDS feature → issue #99 (composite render type — multi-source
# z-ordered layers). Today recipes run a single render type from one source;
# this one needs schema for layered renders and a composite sketch.

name: whale-shark-on-sst
title: Whale shark — reading the ocean
description: >
  The most direct biological story in the catalog. SST as the background
  field; whale-shark observations as scatter dots overlaid on top, showing
  where the animals chose to be. Whale sharks aggregate along the 28°C
  isotherm, avoid the cold tongues, move with the seasons. The image is
  the species reading the ocean's temperature.
created: 2026-05-04
author: chipi
region:
  lat: [-40, 40]
  lon: [-180, 180]
  name: Global tropics
sources:
  primary: oisst                   # the field underneath
  foreground: obis-whale-shark     # the dots on top
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: composite
  colormap: thermal
  opacity: 0.85
  smooth: true
  seed: 28
  # Spike-only: composite render takes a `layers` block describing the
  # z-order of source renders. Fields are rendered first, points last.
  layers:
    - source: primary
      style: field
      opacity: 0.85
    - source: foreground
      style: scatter
      marker_size: 4
      marker_opacity: 0.9
      colormap: arctic   # cool dots stand out against warm SST background
audio:
  drone_waveform: triangle
  drone_glide: 0.6
  pulse_sensitivity: 0.45
  presence: 0.75
  accent_style: bell
  texture_density: 0.35
tension_arc:
  preset: classic
  peak_position: 0.65
  peak_height: 0.95
  release_steepness: 0.55
  pin_key_moment: true
