# whale-shark-seasonal — sightings coloured by month, not by metric.
#
# The intent: reveal the annual rhythm of whale-shark presence. Same scatter
# we already render, but each dot's colour is the month of the observation
# (Jan blue · Apr green · Jul yellow · Oct red, looping back through the
# colour wheel). Aggregation sites become legible by season — Mafia Island
# blooms green/yellow in spring, Yucatán glows red in autumn — without any
# new data. The track-record is already in the processed JSON; only the
# colour assignment changes.
#
# Status: NEEDS feature → issue #96 (`color_by: month` parameter in scatter
# sketch). The processed OBIS data already carries per-point dates, so the
# pipeline side is a one-line render-payload pass-through; the visual change
# is in sketches/scatter.js.

name: whale-shark-seasonal
created: 2026-05-04
author: chipi
region:
  lat: [-40, 40]
  lon: [-180, 180]
  name: Global tropics
sources:
  primary: obis-whale-shark
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: scatter
  colormap: thermal      # cycled around month-of-year [Jan..Dec → 0..1]
  marker_size: 5
  marker_opacity: 0.7
  seed: 217
  # Spike-only: when set, scatter.js reads point.date and converts to
  # month-of-year (1..12 → 0..1) for colour mapping, ignoring point.value.
  color_by: month
  context_layer: coastline
audio:
  drone_waveform: triangle
  drone_glide: 0.5
  pulse_sensitivity: 0.4
  presence: 0.7
  accent_style: chime
  texture_density: 0.35
tension_arc:
  preset: classic
  pin_key_moment: false
