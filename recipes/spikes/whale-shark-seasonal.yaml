# Status: NEEDS feature → issue #96 (`color_by: month` parameter in scatter
# sketch). Processed OBIS data already carries per-point dates; the pipeline
# side is a one-line render-payload pass-through, the visual change lives in
# sketches/scatter.js.

name: whale-shark-seasonal
title: Whale shark — the annual rhythm
description: >
  Same scatter, different colour rule: each dot wears the month of its
  observation (Jan blue, Apr green, Jul yellow, Oct red, looping). Aggregation
  sites become legible by season — Mafia Island green in spring, Yucatán red
  in autumn — without any new data. The track-record is already in the
  processed JSON; only the colour assignment changes.
created: 2026-05-04
author: chipi
region:
  lat: [-40, 40]
  lon: [-180, 180]
  name: Global tropics
sources:
  primary: obis-whale-shark
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: scatter
  colormap: thermal      # cycled around month-of-year [Jan..Dec → 0..1]
  marker_size: 5
  marker_opacity: 0.7
  seed: 217
  # Spike-only: when set, scatter.js reads point.date and converts to
  # month-of-year (1..12 → 0..1) for colour mapping, ignoring point.value.
  color_by: month
  context_layer: coastline
audio:
  drone_waveform: triangle
  drone_glide: 0.5
  pulse_sensitivity: 0.4
  presence: 0.7
  accent_style: chime
  texture_density: 0.35
tension_arc:
  preset: classic
  pin_key_moment: false
