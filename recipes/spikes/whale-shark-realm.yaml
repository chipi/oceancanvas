# whale-shark-realm — fifty years of sightings as a single density field.
#
# The intent: not one animal's path, but the whole species' realm. Bin every
# whale-shark observation since the 1970s into a global lat/lon grid; render
# as a heat field where bright regions are aggregation hotspots — Mafia
# Island, Ningaloo, Galapagos, the Yucatán. The image is a portrait of where
# this species has chosen to live across half a century.
#
# Status: NEEDS feature → issue #95 (gridded density variant in the OBIS
# process task). Today the obis-* processed files emit per-point arrays;
# this recipe needs an aggregated grid output.

name: whale-shark-realm
created: 2026-05-04
author: chipi
region:
  lat: [-40, 40]
  lon: [-180, 180]
  name: Global tropics
sources:
  primary: obis-whale-shark
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: field
  colormap: thermal
  opacity: 0.9
  smooth: true
  seed: 144
  # Spike-only: tells the (future) processing path to bin observations into
  # a 720×360 lat/lon grid and emit counts per cell, rather than a point list.
  aggregate: density
  resolution: 0.5
audio:
  drone_waveform: triangle
  drone_glide: 0.65
  pulse_sensitivity: 0.35
  presence: 0.55
  accent_style: bell
  texture_density: 0.4
tension_arc:
  preset: classic
  peak_position: 0.6
  peak_height: 0.9
  release_steepness: 0.5
  pin_key_moment: false
