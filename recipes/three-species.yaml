# Status: NEEDS feature → issue #99 (composite render type with multiple
# foreground layers). Same primitive whale-shark-on-sst needs, but with
# three foreground point-cloud layers and no field background.

name: three-species
title: Three species, one ocean
description: >
  Every animal reads the ocean differently. Whale shark (surface, warm,
  equatorial), leatherback (cold-edge, hemispheric migrant), elephant seal
  (deep, polar, slope-locked). Render all three on the same canvas, each
  species colour-coded, each layer at its own opacity. The composite is a
  single image of the ocean being interpreted three ways at once — the same
  water yielding three different stories.
created: 2026-05-04
author: chipi
region:
  lat: [-75, 75]
  lon: [-180, 180]
  name: Global oceans
sources:
  primary: obis-whale-shark
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
# Falls back to whale-shark scatter until #99 (composite render type) ships.
# When that ships, leatherback + elephant seal will overlay as additional
# scatter layers in arctic + otherworldly colourways.
render:
  type: scatter
  seed: 999
  colormap: thermal
  marker_size: 4
  marker_opacity: 0.7
  context_layer: coastline
audio:
  drone_waveform: triangle
  drone_glide: 0.6
  pulse_sensitivity: 0.4
  presence: 0.7
  accent_style: chime
  texture_density: 0.4
tension_arc:
  preset: classic
  peak_position: 0.65
  peak_height: 0.9
  release_steepness: 0.5
  pin_key_moment: false
