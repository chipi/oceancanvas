name: argo-scatter
title: Argo float positions
description: >
  The North Atlantic Argo array as a point cloud. Every dot is a robotic
  float that surfaces every ten days to send a temperature-and-salinity
  profile from 2000m up. The image is the network itself, not the readings —
  twenty-five years of "where the scientists were looking."
created: 2026-04-28
author: chipi
region:
  lat: [20, 65]
  lon: [-80, 0]
  name: North Atlantic
sources:
  primary: argo
  context: gebco
schedule: daily

# ⊓ creative controls ⊓
render:
  type: scatter
  colormap: argo
  marker_size: 10
  marker_opacity: 0.85
  seed: 42
audio:
  drone_waveform: triangle
  drone_glide: 0.43
  pulse_sensitivity: 0.44
  presence: 0.62
  accent_style: chime
  texture_density: 0.35
tension_arc:
  preset: classic
  peak_position: 0.65
  peak_height: 1.0
  release_steepness: 0.7
  pin_key_moment: true
