name: whale-shark-galapagos
title: Whale shark — Galápagos, the deep blue
description: >
  Around the Galápagos Islands and stretching east toward the Ecuadorian
  coast, the cold Humboldt Current meets the warm Panama Current — a
  collision zone that draws large pregnant females passing through. Eight
  hundred sightings across a 30-year archive, with a clear July-November
  pulse when the cool water dominates.
