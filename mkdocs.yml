site_name: OceanCanvas
site_description: Generative ocean art that the data performs daily
site_url: https://chipi.github.io/oceancanvas/
repo_url: https://github.com/chipi/oceancanvas
repo_name: chipi/oceancanvas

copyright: MIT License · OceanCanvas contributors

theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: teal
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.indexes
    - navigation.top
    - search.highlight
    - content.code.copy
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: false

nav:
  - Home: index.md
  - Get Started: get-started.md
  - Data Sources: data-sources.md
  - Project Internals:
      - Implementation Guide: implementation.md
      - How It Works: concept/04-technical-architecture.md
      - Design Language: concept/05-design-system.md
      - Architecture: adr/OC_TA.md
      - Product Architecture: prd/OC_PA.md
      - Information Architecture: uxs/OC_IA.md
      - Visual Contracts:
          - Gallery: uxs/UXS-004-gallery.md
          - Dashboard SST: uxs/UXS-001-dashboard-sst.md
          - Dashboard Sea Level: uxs/UXS-002-dashboard-sealevel.md
          - Recipe Editor: uxs/UXS-003-recipe-editor.md
          - Video Editor: uxs/UXS-005-video-editor.md
      - Decisions (ADRs):
          - adr/index.md
          - Prefect: adr/ADR-001-prefect-orchestration.md
          - dlt: adr/ADR-002-dlt-rest-ingestion.md
          - xarray: adr/ADR-003-xarray-netcdf.md
          - Data Store: adr/ADR-004-three-layer-data-store.md
          - No Database: adr/ADR-005-no-database-v1.md
          - p5.js: adr/ADR-006-p5js-sketch-language.md
          - Puppeteer: adr/ADR-007-puppeteer-renderer.md
          - Shared Payload: adr/ADR-008-shared-payload-format.md
          - deck.gl: adr/ADR-009-deck-gl-maplibre.md
          - Observable Plot: adr/ADR-010-observable-plot.md
          - Docker Compose: adr/ADR-011-docker-compose.md
          - Caddy: adr/ADR-012-caddy-static-server.md
          - GitHub Actions: adr/ADR-013-github-actions-code-only.md
          - Synthetic e2e: adr/ADR-014-synthetic-e2e-gate.md
          - Processed JSON: adr/ADR-015-processed-json-format.md
          - Single Author: adr/ADR-016-single-author-phase-1.md
          - One Layout Per Source: adr/ADR-017-one-layout-per-source.md
      - Open Questions (RFCs):
          - rfc/index.md
          - Recipe YAML: rfc/RFC-001-recipe-yaml-schema.md
          - Render Payload: rfc/RFC-002-render-payload-format.md
          - Recipe Lifecycle: rfc/RFC-003-recipe-lifecycle.md
          - Live Preview: rfc/RFC-004-live-preview-architecture.md
          - YAML Round-tripping: rfc/RFC-005-yaml-round-tripping.md
          - Audio System: rfc/RFC-006-audio-system.md
          - Key Moments: rfc/RFC-007-key-moment-detection.md
      - Conventions: claude.md
