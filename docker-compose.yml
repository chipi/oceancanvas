services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 3s
      retries: 5

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "prefect", "version"]
      interval: 15s
      timeout: 5s
      retries: 5

  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./data:/data
      - ./recipes:/recipes:ro
      - ./renders:/renders
      - ./sketches:/sketches:ro
    depends_on:
      prefect-server:
        condition: service_healthy
    command: python -m oceancanvas.deploy
    healthcheck:
      test: ["CMD", "python", "-c", "import oceancanvas; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  gallery:
    build: ./gallery
    ports:
      - "8080:8080"
    environment:
      RECIPE_SERVER: recipe-server:3001
    volumes:
      - ./data/processed:/data/processed:ro
      - ./renders:/renders:ro
      - ./recipes:/recipes:ro
      - ./sketches:/sketches:ro
    depends_on:
      pipeline:
        condition: service_started
      recipe-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 3

  recipe-server:
    image: node:20-slim
    working_dir: /app
    command: node server/save-recipe.mjs
    environment:
      RECIPES_DIR: /recipes
      SAVE_PORT: "3001"
    volumes:
      - ./gallery/server:/app/server:ro
      - ./recipes:/recipes
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:3001/',r=>{process.exit(r.statusCode===404?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
