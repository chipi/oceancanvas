# OceanCanvas — production stack (per ADR-011 Docker Compose deployment).
#
# Six services, one process per concern:
#   • postgres        Prefect's state DB (Phase 1's only datastore — see ADR-005)
#   • prefect-server  Orchestration UI + API at localhost:4200
#   • pipeline        Daily flow runner (Phase 1: cron at 06:00 UTC inside Prefect)
#   • gallery         Caddy serving the React build at localhost:8080
#   • recipe-server   Node.js endpoint that writes recipe YAML to /recipes (port 3001)
#   • export-server   Node.js endpoint that shells out to `oceancanvas export-video` (port 3002)
#
# Volume mounts colocate /data, /recipes, /renders, /sketches, /audio across
# all services that need them. Read-only where the service shouldn't write.
#
# To run: `docker compose up`. To trigger a pipeline run now: `make pipeline-run`.
# Troubleshooting common issues: see docs/get-started.md § Troubleshooting.

services:
  # ── Prefect's state DB ──────────────────────────────────────────────────
  # Phase 1 has no application DB (per ADR-005). This is purely Prefect's
  # bookkeeping: flow runs, task states, retries, schedules.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: prefect
      POSTGRES_PASSWORD: prefect
      POSTGRES_DB: prefect
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prefect"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Prefect orchestration server ────────────────────────────────────────
  # Hosts the UI at :4200. Pipeline workers register here and run flows.
  # `prefect server start` is the minimal hosted variant (per ADR-001).
  prefect-server:
    image: prefecthq/prefect:3-python3.12
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
    environment:
      PREFECT_API_DATABASE_CONNECTION_URL: postgresql+asyncpg://prefect:prefect@postgres:5432/prefect
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "prefect", "version"]
      interval: 15s
      timeout: 5s
      retries: 5

  # ── Daily pipeline ──────────────────────────────────────────────────────
  # Six tasks: discover → fetch → process → build_payload → render → index.
  # Lives in pipeline/. `python -m oceancanvas.deploy` registers the daily
  # schedule with prefect-server. Manual trigger: `make pipeline-run`.
  # Volumes: data is mutable (sources + processed); recipes are read-only;
  # renders accumulate; sketches are read-only (the p5.js render code).
  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    env_file: .env
    environment:
      PREFECT_API_URL: http://prefect-server:4200/api
    volumes:
      - ./data:/data
      - ./recipes:/recipes:ro
      - ./renders:/renders
      - ./sketches:/sketches:ro
    depends_on:
      prefect-server:
        condition: service_healthy
    command: python -m oceancanvas.deploy
    healthcheck:
      test: ["CMD", "python", "-c", "import oceancanvas; print('ok')"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Static gallery ──────────────────────────────────────────────────────
  # Caddy serving the React build at :8080. Reads /renders/manifest.json,
  # /data/processed/* for live preview, /sketches/* for the iframe sketch
  # host, /recipes/*.yaml for the editor. /api/* is reverse-proxied to
  # recipe-server (per gallery/Caddyfile). All static — no app DB.
  gallery:
    build: ./gallery
    ports:
      - "8080:8080"
    environment:
      RECIPE_SERVER: recipe-server:3001
    volumes:
      - ./data/processed:/data/processed:ro
      - ./renders:/renders:ro
      - ./recipes:/recipes:ro
      - ./sketches:/sketches:ro
    depends_on:
      pipeline:
        condition: service_started
      recipe-server:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── Recipe save endpoint ────────────────────────────────────────────────
  # POST /api/recipes/{slug} writes a YAML file to /recipes. Tiny Node.js
  # HTTP server in gallery/server/save-recipe.mjs. Lives in its own
  # container so the gallery's Caddy stays purely static.
  recipe-server:
    image: node:20-slim
    working_dir: /app
    command: node server/save-recipe.mjs
    environment:
      RECIPES_DIR: /recipes
      SAVE_PORT: "3001"
    volumes:
      - ./gallery/server:/app/server:ro
      - ./recipes:/recipes
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"const http=require('http');http.get('http://localhost:3001/',r=>{process.exit(r.statusCode===404?0:1)}).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Video export endpoint ───────────────────────────────────────────────
  # POST /api/export/{recipe} triggers `oceancanvas export-video` (assembled
  # MP4 with generative audio). Mounts /audio for the sample bank used by
  # the audio synthesis step. Renders are read+write because the export
  # writes the MP4 alongside the PNGs.
  export-server:
    image: node:20-slim
    working_dir: /app
    command: node server/export-video.mjs
    environment:
      RENDERS_DIR: /renders
      EXPORT_PORT: "3002"
    volumes:
      - ./gallery/server:/app/server:ro
      - ./renders:/renders
      - ./audio:/audio:ro
    ports:
      - "3002:3002"

volumes:
  pgdata:
